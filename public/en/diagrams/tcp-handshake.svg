<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 880 380' width='880' height='380' role='img' aria-label='TCP three-way handshake'><rect x='0' y='0' width='880' height='380' rx='16' fill='#0f141b'/><rect x='0.5' y='0.5' width='879' height='379' rx='15.5' fill='none' stroke='#232c38'/><text x='24' y='34' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' letter-spacing='0.06em' fill='#8b98a5'>TCP THREE-WAY HANDSHAKE</text><rect x='90' y='60' width='160' height='34' rx='10' fill='none' stroke='#232c38'/><text x='170.0' y='77.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#7dd3fc' text-anchor='middle' dominant-baseline='middle'>Client</text><rect x='630' y='60' width='160' height='34' rx='10' fill='none' stroke='#232c38'/><text x='710.0' y='77.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#3ad6a3' text-anchor='middle' dominant-baseline='middle'>Server</text><line x1='170' y1='96' x2='170' y2='330' stroke='#232c38' stroke-dasharray='3 4'/><line x1='710' y1='96' x2='710' y2='330' stroke='#232c38' stroke-dasharray='3 4'/><defs><marker id='a12546' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#3ad6a3'/></marker></defs><line x1='170' y1='140' x2='710' y2='140' stroke='#3ad6a3' stroke-width='2' marker-end='url(#a12546)'/><text x='440.0' y='132.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' fill='#3ad6a3' text-anchor='middle'>SYN  seq=x</text><defs><marker id='a42201' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#7dd3fc'/></marker></defs><line x1='710' y1='210' x2='170' y2='210' stroke='#7dd3fc' stroke-width='2' marker-end='url(#a42201)'/><text x='440.0' y='202.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' fill='#7dd3fc' text-anchor='middle'>SYN-ACK  seq=y, ack=x+1</text><defs><marker id='a60489' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#3ad6a3'/></marker></defs><line x1='170' y1='280' x2='710' y2='280' stroke='#3ad6a3' stroke-width='2' marker-end='url(#a60489)'/><text x='440.0' y='272.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' fill='#3ad6a3' text-anchor='middle'>ACK  ack=y+1</text><text x='440' y='355' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='13' fill='#8b98a5' text-anchor='middle'>Connection established — data can now flow both ways.</text></svg>