<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 880 380' width='880' height='380' role='img' aria-label='Symmetric vs asymmetric encryption'><rect x='0' y='0' width='880' height='380' rx='16' fill='#0f141b'/><rect x='0.5' y='0.5' width='879' height='379' rx='15.5' fill='none' stroke='#232c38'/><text x='24' y='34' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' letter-spacing='0.06em' fill='#8b98a5'>SYMMETRIC VS ASYMMETRIC ENCRYPTION</text><text x='230' y='70' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='700' fill='#e7edf3' text-anchor='middle'>Symmetric</text><text x='650' y='70' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='700' fill='#e7edf3' text-anchor='middle'>Asymmetric</text><line x1='440' y1='55' x2='440' y2='360' stroke='#232c38'/><rect x='60' y='120' width='120' height='50' rx='10' fill='#131a23' stroke='#232c38'/><text x='120.0' y='145.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#7dd3fc' text-anchor='middle' dominant-baseline='middle'>Alice</text><rect x='300' y='120' width='120' height='50' rx='10' fill='#131a23' stroke='#232c38'/><text x='360.0' y='145.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#3ad6a3' text-anchor='middle' dominant-baseline='middle'>Bob</text><defs><marker id='a98182' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#3ad6a3'/></marker></defs><line x1='180' y1='145' x2='300' y2='145' stroke='#3ad6a3' stroke-width='2' marker-end='url(#a98182)'/><text x='240.0' y='137.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' fill='#3ad6a3' text-anchor='middle'>encrypt / decrypt</text><rect x='210' y='210' width='60' height='40' rx='8' fill='none' stroke='#fbbf24'/><text x='240' y='235' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#fbbf24' text-anchor='middle'>1 key</text><text x='240' y='285' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='12.5' fill='#8b98a5' text-anchor='middle'>Same secret key both sides —</text><text x='240' y='302' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='12.5' fill='#8b98a5' text-anchor='middle'>fast, but you must share it safely.</text><rect x='480' y='120' width='120' height='50' rx='10' fill='#131a23' stroke='#232c38'/><text x='540.0' y='145.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#7dd3fc' text-anchor='middle' dominant-baseline='middle'>Alice</text><rect x='720' y='120' width='120' height='50' rx='10' fill='#131a23' stroke='#232c38'/><text x='780.0' y='145.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#3ad6a3' text-anchor='middle' dominant-baseline='middle'>Bob</text><defs><marker id='a10652' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#7dd3fc'/></marker></defs><line x1='600' y1='138' x2='720' y2='138' stroke='#7dd3fc' stroke-width='2' marker-end='url(#a10652)'/><text x='660.0' y='130.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' fill='#7dd3fc' text-anchor='middle'>Bob's public key</text><defs><marker id='a582' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#3ad6a3'/></marker></defs><line x1='720' y1='166' x2='600' y2='166' stroke='#3ad6a3' stroke-width='2' marker-end='url(#a582)'/><text x='660.0' y='158.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' fill='#3ad6a3' text-anchor='middle'>Bob's private key</text><text x='660' y='240' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='12.5' fill='#8b98a5' text-anchor='middle'>Public key locks,</text><text x='660' y='257' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='12.5' fill='#8b98a5' text-anchor='middle'>private key unlocks — no shared secret.</text></svg>