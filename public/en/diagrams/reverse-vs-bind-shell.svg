<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 880 380' width='880' height='380' role='img' aria-label='Reverse vs bind shell'><rect x='0' y='0' width='880' height='380' rx='16' fill='#0f141b'/><rect x='0.5' y='0.5' width='879' height='379' rx='15.5' fill='none' stroke='#232c38'/><text x='24' y='34' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' letter-spacing='0.06em' fill='#8b98a5'>REVERSE VS BIND SHELL</text><text x='230' y='70' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='700' fill='#e7edf3' text-anchor='middle'>Bind shell</text><text x='650' y='70' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='700' fill='#e7edf3' text-anchor='middle'>Reverse shell</text><line x1='440' y1='55' x2='440' y2='360' stroke='#232c38'/><rect x='60' y='110' width='150' height='54' rx='10' fill='#131a23' stroke='#232c38'/><text x='135.0' y='131.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#e7edf3' text-anchor='middle' dominant-baseline='middle'>Attacker</text><text x='135.0' y='151.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>connects in</text><rect x='300' y='110' width='150' height='54' rx='10' fill='#131a23' stroke='#232c38'/><text x='375.0' y='131.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#3ad6a3' text-anchor='middle' dominant-baseline='middle'>Target</text><text x='375.0' y='151.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>opens a port</text><defs><marker id='a7114' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#fbbf24'/></marker></defs><line x1='210' y1='137' x2='300' y2='137' stroke='#fbbf24' stroke-width='2' marker-end='url(#a7114)'/><text x='255' y='192' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#f87171' text-anchor='middle'>inbound — often</text><text x='255' y='208' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#f87171' text-anchor='middle'>blocked by firewall</text><rect x='480' y='110' width='150' height='54' rx='10' fill='#131a23' stroke='#232c38'/><text x='555.0' y='131.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#3ad6a3' text-anchor='middle' dominant-baseline='middle'>Target</text><text x='555.0' y='151.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>payload runs</text><rect x='720' y='110' width='150' height='54' rx='10' fill='#131a23' stroke='#232c38'/><text x='795.0' y='131.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#e7edf3' text-anchor='middle' dominant-baseline='middle'>Attacker</text><text x='795.0' y='151.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>is listening</text><defs><marker id='a31628' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#3ad6a3'/></marker></defs><line x1='630' y1='137' x2='720' y2='137' stroke='#3ad6a3' stroke-width='2' marker-end='url(#a31628)'/><text x='675' y='192' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#3ad6a3' text-anchor='middle'>outbound — usually</text><text x='675' y='208' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#3ad6a3' text-anchor='middle'>allowed out</text><text x='440' y='340' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='13' fill='#8b98a5' text-anchor='middle'>Reverse shells win because firewalls trust traffic leaving the network more than traffic coming in.</text></svg>