<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 880 340' width='880' height='340' role='img' aria-label='Man in the middle / packet sniffing'><rect x='0' y='0' width='880' height='340' rx='16' fill='#0f141b'/><rect x='0.5' y='0.5' width='879' height='339' rx='15.5' fill='none' stroke='#232c38'/><text x='24' y='34' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='13' letter-spacing='0.06em' fill='#8b98a5'>MAN IN THE MIDDLE / PACKET SNIFFING</text><rect x='60' y='150' width='150' height='60' rx='10' fill='#131a23' stroke='#232c38'/><text x='135.0' y='174.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#7dd3fc' text-anchor='middle' dominant-baseline='middle'>Client</text><text x='135.0' y='194.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>sends data</text><rect x='360' y='140' width='160' height='80' rx='10' fill='#131a23' stroke='#f87171'/><text x='440.0' y='174.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#f87171' text-anchor='middle' dominant-baseline='middle'>Attacker</text><text x='440.0' y='194.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>sniffs / relays</text><rect x='680' y='150' width='150' height='60' rx='10' fill='#131a23' stroke='#232c38'/><text x='755.0' y='174.0' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='15' font-weight='600' fill='#3ad6a3' text-anchor='middle' dominant-baseline='middle'>Server</text><text x='755.0' y='194.0' font-family='IBM Plex Mono, ui-monospace, Menlo, monospace' font-size='12' fill='#8b98a5' text-anchor='middle'>replies</text><defs><marker id='a31891' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#8b98a5'/></marker></defs><line x1='210' y1='180' x2='360' y2='180' stroke='#8b98a5' stroke-width='2' marker-end='url(#a31891)'/><defs><marker id='a28226' markerWidth='9' markerHeight='9' refX='7' refY='3' orient='auto'><path d='M0,0 L7,3 L0,6 Z' fill='#8b98a5'/></marker></defs><line x1='520' y1='180' x2='680' y2='180' stroke='#8b98a5' stroke-width='2' marker-end='url(#a28226)'/><text x='435' y='300' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='13' fill='#8b98a5' text-anchor='middle'>On a shared or compromised path, an attacker in the middle can read — or alter — every packet.</text><text x='440' y='108' font-family='IBM Plex Sans, -apple-system, Segoe UI, Roboto, sans-serif' font-size='13' fill='#fbbf24' text-anchor='middle'>Encryption (TLS) is what makes the captured traffic useless to the sniffer.</text></svg>