# Netlify configuration for Hackers Handbook Vol. 1
# ------------------------------------------------
# The build runs Astro and then Pagefind to generate the offline search index
# (`npm run build` == `astro build && pagefind --site dist`).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Pagefind is a devDependency and must be installed during the build.
  NPM_FLAGS = "--include=dev"

# ---- Security headers (applied to every response) --------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

# ---- Long-lived caching for fingerprinted assets ---------------------
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static images/videos shipped alongside the pages
[[headers]]
  for = "/en/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
