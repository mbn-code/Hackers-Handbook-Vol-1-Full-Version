# Netlify configuration for Hackers Handbook Vol. 1
# ------------------------------------------------
# `npm run build` == `astro build && pagefind --site dist` (Pagefind generates
# the offline search index into dist/pagefind).
# Security headers and cache rules live in public/_headers.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
